# Task

Find a polinomial function that fills out these conditions:
  Coefficient of $x^7$ must be $-1$
  $G_{f}$ is point symmetric to $(0, 0)$
  $x = -5$ has a zero with a multiple of $2$
  $x = -2$ has a zero with a multiple of $1$
  
# Answer

$$ f(x)=(x+5)^2*(x+2)*(-x^4) $$
