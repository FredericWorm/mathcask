# Task

Find a polinomial function that fills out these conditions:
  Coefficient of $x^7$ must be $-1$\newline
  $G_{f}$ is point symmetric to $(0, 0)$\newline
  $x = -5$ has a zero with a multiple of $2$\newline
  $x = -2$ has a zero with a multiple of $1$\newline
  
# Answer

$$ f(x)=(x+5)^2*(x+2)*(-x^4) $$
