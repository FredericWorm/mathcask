# Task

Find a polinomial function that fills out these conditions:
- Degree must be 7
- Coefficient of $x^7$ must be $-1\newline$
- The graph $G_{f}$ of $f$ is point symmetric to $(0, 0)\newline$
- $x = -5$ has a zero with a multiple of $2\newline$
- $x = -2$ has a zero with a multiple of $1\newline$
  
# Answer

Initial answer; Wrong as it's not symmetric
$$ f(x)=(x+5)^2*(x+2)*(-x^4) $$

Next answer; Added roots, mirroring the existing ones
$$ f(x)=(x+5)^2*(x+2)*(x-5)^2*(x-2)*(-x) $$
